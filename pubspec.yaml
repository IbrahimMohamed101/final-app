name: basic_diet
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  bloc: ^9.2.0
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  dio: ^5.9.2
  easy_localization: ^3.0.8
  equatable: ^2.0.8
  firebase_core: ^4.7.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  pinput: ^5.0.0
  flutter_phoenix: ^1.1.1
  flutter_screenutil: ^5.9.3
  flutter_secure_storage: ^10.0.0
  flutter_svg:
  fluttertoast: ^9.0.0
  gap: ^3.0.1
  get_it: ^9.2.1
  go_router: any
  internet_connection_checker: ^3.0.1
  intl:
  json_annotation:
  pretty_dio_logger: ^1.4.0
  retrofit:
  retrofit_generator:
  rxdart: ^0.28.0
  url_launcher: ^6.3.2
  uuid: ^4.5.3
  webview_flutter: ^4.10.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.8.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/appLogo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/appLogo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/json/
    - assets/translations/
    - .env

  fonts:
    - family: Arimo
      fonts:
        - asset: assets/fonts/Arimo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Arimo-BoldItalic.ttf
          weight: 700
        - asset: assets/fonts/Arimo-Italic.ttf
          weight: 400
        - asset: assets/fonts/Arimo-Regular.ttf
          weight: 400
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
